<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>肾癌精准随访助手 - 张彩祥医生</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f9; padding-top: 20px; font-family: -apple-system, "Noto Sans SC", sans-serif; }
        .card { border-radius: 16px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .section-title { border-left: 5px solid #0d6efd; padding-left: 12px; margin: 25px 0 15px; font-weight: bold; }
        .form-label { font-weight: 500; color: #444; }
        .result-card { background: linear-gradient(145deg, #ffffff, #f0f7ff); border: 1px solid #dee2e6; }
        .timeline-table { font-size: 0.85rem; }
        .timeline-table th { background-color: #f8f9fa; text-align: center; font-weight: 600; }
        .highlight-date { color: #dc3545; font-weight: bold; font-size: 1.2rem; }
        .doctor-note { font-size: 0.85rem; background-color: #f8f9fa; border-left: 4px solid #6c757d; padding: 12px; margin-top: 15px; }
        .text-range { color: #0d6efd; font-weight: 600; }
        .disclaimer { font-size: 0.75rem; color: #adb5bd; margin-top: 30px; padding: 20px 0; border-top: 1px solid #e9ecef; }
        .past-date { text-decoration: line-through; color: #ced4da; } /* 已过期日期的样式 */
    </style>
</head>
<body>

<div class="container" style="max-width: 800px;">
    <div class="card p-4 mb-4">
        <h3 class="text-center text-primary mb-1">肾癌 (RCC) 精准随访助手</h3>
        <p class="text-center text-muted small mb-4">依据 EAU Guidelines 2026 版</p>
        
        <form id="followupForm">
            <div class="section-title">1. 手术与分型</div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">手术日期</label>
                    <input type="date" class="form-control" id="opDate">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">病理分型</label>
                    <select class="form-select" id="histology" onchange="toggleScoringSystem()">
                        <option value="ccRCC">透明细胞癌 (ccRCC)</option>
                        <option value="non-ccRCC">非透明细胞癌 (non-ccRCC)</option>
                    </select>
                </div>
            </div>

            <div class="section-title">2. 预后参数评估</div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">T 分期</label>
                    <select class="form-select" id="tStage">
                        <option value="1a">pT1a</option>
                        <option value="1b">pT1b</option>
                        <option value="2">pT2 (a/b)</option>
                        <option value="3a">pT3a</option>
                        <option value="3bc">pT3b-c</option>
                        <option value="4">pT4</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">N 分期</label>
                    <select class="form-select" id="nStage">
                        <option value="0">pN0 / pNx</option>
                        <option value="1">pN1 (有转移)</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">ISUP/WHO 核分级</label>
                    <select class="form-select" id="grade">
                        <option value="1">G1</option>
                        <option value="2">G2</option>
                        <option value="3">G3</option>
                        <option value="4">G4</option>
                    </select>
                </div>
            </div>

            <div id="ccRCC_params" class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">肿瘤直径 (cm)</label>
                    <input type="number" step="0.1" class="form-control" id="tumorSize" placeholder="如: 5.0">
                </div>
                <div class="col-md-6 mb-3 mt-4">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="necrosis">
                        <label class="form-check-label" for="necrosis">伴有肿瘤坏死</label>
                    </div>
                </div>
            </div>

            <button type="button" class="btn btn-primary w-100 py-2 mt-3" onclick="generatePlan()">生成完整随访计划表</button>
        </form>

        <div id="resultArea" class="mt-4 d-none">
            <div class="card p-3 result-card">
                <h5 class="fw-bold mb-3">随访评估报告</h5>
                <div class="row">
                    <div class="col-6">
                        <small class="text-muted d-block">风险分层 (Leibovich)</small>
                        <span id="riskLabel" class="badge bg-secondary fs-6"></span>
                    </div>
                    <div class="col-6">
                        <small class="text-muted d-block">评分详情</small>
                        <span id="scoreDetail" class="fw-bold"></span>
                    </div>
                </div>
                <hr>
                <div class="alert alert-light border-0 p-0 mb-3">
                    <p class="mb-1">建议下一次随访时间：</p>
                    <span id="nextDate" class="highlight-date"></span>
                    <small id="nextInfo" class="d-block text-muted mt-1"></small>
                </div>
                
                <h6 class="fw-bold mt-4">详细随访计划表：</h6>
                <div class="table-responsive">
                    <table class="table table-sm table-bordered timeline-table mt-2">
                        <thead>
                            <tr>
                                <th style="width: 25%;">时间节点</th>
                                <th>关注重点建议</th>
                            </tr>
                        </thead>
                        <tbody id="timelineBody"></tbody>
                    </table>
                </div>

                <div class="doctor-note">
                    <strong>🩺 医师提醒：</strong><br>
                    随访目标应涵盖：关注术后并发症；肾功能；局部复发；对侧肾脏复发；远处转移；以及心血管事件。3个月后重点转为长期监测。
                </div>
            </div>
        </div>

        <div class="disclaimer text-center">
            <p>该随访意见依据欧洲泌尿指南，仅供参考，具体随访计划由患者和医师依据具体情况决定。
               该随访意见仅针对局限性肾癌患者，转移性患者请咨询肿瘤科医师制定个体化治疗方案。
            </p>
        </div>
    </div>
</div>

<script>
function toggleScoringSystem() {
    const isccRCC = document.getElementById('histology').value === 'ccRCC';
    document.getElementById('ccRCC_params').style.display = isccRCC ? 'flex' : 'none';
}

function generatePlan() {
    const opDateInput = document.getElementById('opDate').value;
    if(!opDateInput) { alert("请先选择手术日期"); return; }
    const dateParts = opDateInput.split('-');
    const opDate = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);

    const histology = document.getElementById('histology').value;
    const t = document.getElementById('tStage').value;
    const n = document.getElementById('nStage').value;
    const grade = parseInt(document.getElementById('grade').value);
    const size = parseFloat(document.getElementById('tumorSize').value) || 0;
    const necrosis = document.getElementById('necrosis').checked;

    let riskLevel = ""; 
    let scoreText = "";

    if (histology === 'ccRCC') {
        let score = 0;
        if (t === '1b') score += 2; else if (t === '2') score += 3; else if (t.startsWith('3') || t === '4') score += 4;
        if (n === '1') score += 2;
        if (size >= 5) score += 1;
        if (grade === 3) score += 1; else if (grade === 4) score += 3;
        if (necrosis) score += 1;

        scoreText = `Leibovich Score: ${score}分`;
        if (score <= 2) riskLevel = "低危";
        else if (score <= 5) riskLevel = "中危";
        else riskLevel = "高危";
    } else {
        if (n === '1' || t === '2'|| t.startsWith('3')|| t === '4') riskLevel = "高危";
        else if ((t === '1a' || t === '1b') && grade <= 2) riskLevel = "低危";
        else riskLevel = "中危";
        scoreText = "Non-ccRCC TNM 分级";
    }

    renderResult(opDate, riskLevel, scoreText);
}

function renderResult(opDate, risk, score) {
    const riskBadge = document.getElementById('riskLabel');
    riskBadge.innerText = risk;
    riskBadge.className = "badge fs-6 " + (risk === "低危" ? "bg-success" : (risk === "中危" ? "bg-warning text-dark" : "bg-danger"));
    document.getElementById('scoreDetail').innerText = score;

    let plan = [];
    if (risk === "低危") {
        plan = [
            { m: 6, l: "术后 6 个月" },
            { m: 18, l: "术后 18 个月" },
            { m: 30, l: "术后 2 年半" },
            { range: "after3", l: "3 年 - 5 年", desc: "每两年随访一次" },
            { range: "after5", l: "> 5 年", desc: "由于复发风险极低，可考虑停止随访或根据临床决定" }
        ];
    } else if (risk === "中危") {
        plan = [
            { m: 6, l: "术后 6 个月" },
            { m: 12, l: "术后 12 个月" },
            { m: 24, l: "术后 2 年" },
            { m: 36, l: "术后 3 年" },
            { range: "after3", l: "3 年 - 5 年", desc: "每年随访一次" },
            { range: "after5", l: "> 5 年", desc: "每两年随访一次" }
        ];
    } else {
        plan = [
            { m: 3, l: "术后 3 个月" },
            { m: 6, l: "术后 6 个月" },
            { m: 12, l: "术后 12 个月" },
            { m: 18, l: "术后 18 个月" },
            { m: 24, l: "术后 2 年" },
            { m: 36, l: "术后 3 年" },
            { range: "after3", l: "3 年 - 5 年", desc: "每年随访一次" },
            { range: "after5", l: "> 5 年", desc: "每两年随访一次" }
        ];
    }

    const today = new Date(); // 获取当前时间
    const formatDate = (date) => `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
    
    const tbody = document.getElementById('timelineBody');
    tbody.innerHTML = "";
    
    let nextFollowupDate = null;
    let nextFollowupLabel = "";

    plan.forEach(p => {
    let items = ["肾功能", "局部复发", "对侧肾脏复发", "远处转移", "心血管事件"];
    if (p.m && p.m <= 3) items.unshift("术后并发症");

    let contentStr = items.join("；") + "。";
    let dateStr = "";
    let isPast = false;

    // --- 1. 处理固定月份节点 ---
    if (p.m) {
        const milestoneDate = new Date(opDate.getTime());
        milestoneDate.setMonth(milestoneDate.getMonth() + p.m);
        dateStr = formatDate(milestoneDate);

        if (milestoneDate < today) {
            isPast = true; 
        } else if (!nextFollowupDate) {
            nextFollowupDate = milestoneDate;
            nextFollowupLabel = p.l;
        }
    } 
    // --- 2. 处理时间区间 (3-5年 或 >5年) ---
    else if (p.range) {
        contentStr = `<span class="text-range">${p.desc}</span><br>${contentStr}`;
        dateStr = "长期/持续";

        // 获取时间界限：3年和5年的确切日期
        const threeYearDate = new Date(opDate.getTime());
        threeYearDate.setMonth(threeYearDate.getMonth() + 36);
        const fiveYearDate = new Date(opDate.getTime());
        fiveYearDate.setMonth(fiveYearDate.getMonth() + 60);

        if (p.range === "after3") {
            // 如果今天已经过了 5 年，那么 3-5 年阶段就变灰加删除线
            if (today > fiveYearDate) {
                isPast = true;
            } else if (today > threeYearDate && !nextFollowupDate) {
                // 如果今天在 3-5 年之间，且还没锁定下一次，则锁定这一行
                nextFollowupLabel = p.l;
                nextFollowupDate = "处于 3-5 年随访期";
            }
        } 
        else if (p.range === "after5") {
            // 如果今天已经过了 5 年，锁定这一行作为“当前阶段”
            if (today > fiveYearDate && !nextFollowupDate) {
                nextFollowupLabel = p.l;
                nextFollowupDate = "处于 5 年以上长期监测期";
            }
        }
    }

    // --- 3. 渲染行 ---
    const rowClass = isPast ? "past-date" : "";
    tbody.innerHTML += `
        <tr class="${rowClass}">
            <td class="text-center"><b>${p.l}</b><br><small class="${isPast ? '' : 'text-muted'}">${dateStr}</small></td>
            <td>${contentStr}</td>
        </tr>`;
});

    // 更新“下一次随访时间”展示
    const nextDateEl = document.getElementById('nextDate');
    const nextInfoEl = document.getElementById('nextInfo');
    
    if (nextFollowupDate instanceof Date) {
        nextDateEl.innerText = formatDate(nextFollowupDate);
        nextInfoEl.innerText = `下次随访计划为（${nextFollowupLabel}），请提前预约相关检查。`;
    } else {
        nextDateEl.innerText = nextFollowupDate || "请咨询医师";
        nextInfoEl.innerText = "目前处于长期监测阶段，请依据上次随访时间进行判断。";
    }

    document.getElementById('resultArea').classList.remove('d-none');
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
